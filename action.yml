name: 'AVERA Change Verification'
description: 'Turn engineering change artifacts into a structured, traceable evidence pack — ready for release review (ISO 26262, DO-178C, IEC 62304, EN 50128). Deterministic gate; optional evidence-grounded AI assistance.'
author: 'AVERA Engineering'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  baseline:
    description: 'Zero-config mode: path to the baseline JUnit/xUnit XML (known-good run, e.g. main). Set together with `current` to run the simple `check` gate — no evidence pack needed. Ideal for plain pass/fail CI.'
    required: false
    default: ''
  current:
    description: 'Zero-config mode: path to the current JUnit/xUnit XML (the run to gate, e.g. the PR). Pair with `baseline`.'
    required: false
    default: ''
  report_only:
    description: 'Advisory mode (zero-config): print the verdict but never fail the job (always exit 0). Recommended for a first trial on a noisy repo, where a flaky test flipping pass→fail would otherwise look like a real regression.'
    required: false
    default: 'false'
  project_path:
    description: 'Full evidence-pack mode: path to the evidence pack directory (baseline + current results, requirements.csv, component_map.json, change_description.txt). Use this OR the baseline/current pair.'
    required: false
    default: ''
  output_path:
    description: 'Directory where the full canonical artifact set is written (report, markdown, evidence graph, traceability, decision, trend, workspace pack, evidence manifest, audit log).'
    required: false
    default: 'avera-reports'
  policy:
    description: 'Optional built-in gate policy for the gate_status output: general, automotive, aviation, medical, railway, space, ai_agent. Empty uses the default (general) policy.'
    required: false
    default: ''
  fail_on_release_blocking:
    description: 'Fail the workflow when AVERA classifies risk as release_blocking. Default true — recommended for safety-critical CI gates.'
    required: false
    default: 'true'
  fail_on_regression:
    description: 'Fail the workflow on any confirmed_regression verdict, regardless of risk level. Default false.'
    required: false
    default: 'false'
  fail_on_gate:
    description: 'Fail the workflow when the deterministic gate status is block or review. Default true — so the action never reports gate_status=block while passing. Set false for an advisory run that only reports.'
    required: false
    default: 'true'
  expected_verdict:
    description: 'Optional. When set, assert that AVERA produces this specific verdict (e.g. confirmed_regression, successful_change). Mismatch fails the run.'
    required: false
    default: ''

outputs:
  verdict:
    description: 'AVERA verdict (confirmed_regression / successful_change / preexisting_failure / worsened_preexisting_failure / environment_failure / insufficient_evidence / requirements_coverage_gap).'
  risk:
    description: 'AVERA risk classification (release_blocking / high / medium / low / unknown).'
  confidence:
    description: 'AVERA confidence (high / medium / low).'
  gate_status:
    description: 'Deterministic gate status for the selected policy (pass / review / block).'
  report_path:
    description: 'Filesystem path to avera-report.json.'
  manifest_path:
    description: 'Filesystem path to avera-evidence-manifest.json.'
  integrity_root:
    description: 'Content-addressed SHA-256 integrity root binding the evidence set.'
  audit_log_path:
    description: 'Filesystem path to the hash-chained avera-audit.jsonl.'

runs:
  using: 'docker'
  image: 'Dockerfile.action'
