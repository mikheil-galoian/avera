name: AVERA Action Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "action.yml"
      - "action-entrypoint.sh"
      - "Dockerfile.action"
      - "src/**"
      - "policies/**"
      - "pyproject.toml"
      - "fixtures/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run local AVERA action
        id: avera
        uses: ./
        with:
          project_path: fixtures/bms-fast-charge
          output_path: avera-reports
          # bms-fast-charge is a confirmed regression; don't fail the smoke run on it.
          fail_on_release_blocking: 'false'

      - name: Assert canonical artifacts and outputs
        shell: bash
        run: |
          set -euo pipefail
          for f in \
            avera-report.json avera-report.md avera-evidence-graph.json \
            avera-traceability-index.json avera-decision.json avera-trend-index.json \
            avera-workspace-pack.json avera-evidence-manifest.json avera-audit.jsonl; do
            test -f "avera-reports/$f" || { echo "missing artifact: $f"; exit 1; }
          done
          echo "verdict=${{ steps.avera.outputs.verdict }}"
          echo "risk=${{ steps.avera.outputs.risk }}"
          echo "gate_status=${{ steps.avera.outputs.gate_status }}"
          echo "integrity_root=${{ steps.avera.outputs.integrity_root }}"
          test -n "${{ steps.avera.outputs.integrity_root }}" || { echo "empty integrity_root"; exit 1; }

      - name: Upload action artifact set
        uses: actions/upload-artifact@v4
        with:
          name: avera-action-smoke
          path: avera-reports/
