# ── AVERA Safety Gate ────────────────────────────────────────────────────────
#
# PURPOSE
# ───────
# This workflow demonstrates AVERA as a CI/CD gate enforcer.
# It runs the AVERA analysis engine against every domain fixture and verifies
# that each result matches fixtures/expected_outcomes.json. Some fixtures are
# intentionally release_blocking; those pass when AVERA detects them correctly.
#
# INVESTOR DEMO VALUE
# ───────────────────
# This file is the evidence that AVERA is not just a reporting tool: it is an
# automated safety-gate verifier that can be used as a CI/CD policy check.
# The same contract works in Jenkins, GitLab CI, Azure Pipelines, etc.
#
# TRIGGERS
# ────────
# • Push / PR to main or develop that touches fixtures or source
# • Manual dispatch with optional fixture override
# • Can be called as a reusable workflow from any external repo

name: AVERA Safety Gate

on:
  push:
    branches: ["main", "develop"]
    paths:
      - ".github/workflows/avera-gate.yml"
      - "fixtures/**"
      - "src/**"
      - "tests/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - ".github/workflows/avera-gate.yml"
      - "fixtures/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:
    inputs:
      fixture:
        description: "Fixture to analyze (leave blank = all)"
        required: false
        default: ""
      fail_on_release_blocking:
        description: "Fail pipeline on release_blocking verdict"
        required: false
        default: "true"

jobs:
  # ── Job 1: Unit & integration tests ────────────────────────────────────────
  tests:
    name: "Tests — pytest"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install AVERA
        run: pip install -e ".[api,dev]" --quiet

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short \
            --junit-xml=reports/junit/test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/junit/


  # ── Job 2: Safety gate — all four industry domains ─────────────────────────
  safety-gate:
    name: "Safety Gate — ${{ matrix.fixture }}"
    runs-on: ubuntu-latest
    needs: tests

    # Run one job per fixture in parallel
    strategy:
      fail-fast: false        # report ALL failures, not just the first
      matrix:
        fixture:
          - bms-fast-charge                    # Automotive / ISO 26262 / ASIL-D
          - adas-pedestrian-detection-regression  # Automotive / ASIL-D
          - powertrain-overspeed-regression    # Automotive / ASIL-D → release_blocking
          - fadec-overspeed-regression         # Aviation   / DO-178C / DAL-A → release_blocking
          - fcc-envelope-regression            # Aviation   / DO-178C / DAL-A → release_blocking
          - etcs-brake-response-regression     # Railway    / EN-50128 / SIL-4 → release_blocking
          - infusion-pump-flow-regression      # Medical    / IEC-62304 / Class-C

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install AVERA
        run: pip install -e ".[api]" --quiet

      # ── Core gate step ──────────────────────────────────────────────────────
      # Demo fixtures include known release_blocking regressions. On repository
      # CI, the gate passes when AVERA detects the expected verdict/risk rather
      # than failing merely because a fixture is intentionally unsafe.
      - name: "Run AVERA gate — ${{ matrix.fixture }}"
        id: gate
        env:
          FIXTURE: ${{ matrix.fixture }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  AVERA Safety Gate"
          echo "  Fixture : $FIXTURE"
          echo "  Commit  : ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          OUT_DIR="reports/gate/$FIXTURE"
          REPORT="$OUT_DIR/avera-report.json"
          mkdir -p "$OUT_DIR"

          python -m avera analyze \
            --project "fixtures/$FIXTURE" \
            --out "$OUT_DIR" \
            2>&1 | tee /tmp/avera-output.txt

          python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          fixture = os.environ["FIXTURE"]
          report_path = pathlib.Path("reports/gate") / fixture / "avera-report.json"
          expected_path = pathlib.Path("fixtures/expected_outcomes.json")

          report = json.loads(report_path.read_text(encoding="utf-8"))
          expected = json.loads(expected_path.read_text(encoding="utf-8"))[fixture]

          fields = ("verdict", "risk", "confidence")
          mismatches = [
              f"{field}: expected {expected.get(field)!r}, got {report.get(field)!r}"
              for field in fields
              if expected.get(field) != report.get(field)
          ]

          summary = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as fh:
              fh.write(f"## AVERA Gate Result — `{fixture}`\n\n")
              fh.write("| Field | Expected | Actual |\n")
              fh.write("|-------|----------|--------|\n")
              for field in fields:
                  fh.write(
                      f"| {field} | `{expected.get(field)}` | `{report.get(field)}` |\n"
                  )
              fh.write("\n")
              if mismatches:
                  fh.write("> ❌ **Gate mismatch** — AVERA output did not match the expected fixture outcome.\n")
              else:
                  fh.write("> ✅ **Gate verified** — expected outcome detected correctly.\n")

          if mismatches:
              print("AVERA gate mismatch:")
              for mismatch in mismatches:
                  print(f" - {mismatch}")
              sys.exit(1)

          print(
              "AVERA gate verified:",
              fixture,
              report.get("verdict"),
              report.get("risk"),
              report.get("confidence"),
          )
          PY

          VERDICT=$(python -c "import json; print(json.load(open('$REPORT'))['verdict'])")
          RISK=$(python -c "import json; print(json.load(open('$REPORT'))['risk'])")
          CONF=$(python -c "import json; print(json.load(open('$REPORT'))['confidence_score'])")

          echo ""
          echo "  VERDICT          : $VERDICT"
          echo "  RISK             : $RISK"
          echo "  CONFIDENCE SCORE : $CONF"
          echo ""

      # ── Upload evidence report ──────────────────────────────────────────────
      - name: Upload AVERA evidence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "avera-report-${{ matrix.fixture }}"
          path: |
            /tmp/avera-output.txt
            reports/gate/${{ matrix.fixture }}/
          retention-days: 30


  # ── Job 3: Gate summary ─────────────────────────────────────────────────────
  gate-summary:
    name: "Gate Summary"
    runs-on: ubuntu-latest
    needs: safety-gate
    if: always()

    steps:
      - name: Report gate outcome
        run: |
          if [ "${{ needs.safety-gate.result }}" = "success" ]; then
            echo "✅ All AVERA safety-gate fixtures matched expected outcomes."
            echo "   Domains verified: Automotive / Aviation / Railway / Medical"
          else
            echo "❌ One or more AVERA safety gates FAILED."
            echo "   At least one fixture did not match its expected verdict/risk/confidence."
            echo "   Review the individual job summaries above."
            exit 1
          fi
