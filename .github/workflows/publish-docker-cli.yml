# ─────────────────────────────────────────────────────────────
# AVERA CLI — publish to GitHub Container Registry (GHCR)
#
# Produces ghcr.io/<owner>/avera-cli with the following tags:
#   • latest          — only when pushed to the default branch
#   • <branch>        — on every branch push
#   • sha-<sha7>      — on every push
#   • vX.Y.Z, vX.Y, X — on semver tags (v0.1.0, v1.2, etc.)
#
# Manual trigger via workflow_dispatch is also supported.
# ─────────────────────────────────────────────────────────────

name: Publish AVERA CLI to GHCR

on:
  push:
    branches:
      - main
      - Kiku
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'Dockerfile.cli'
      - 'scripts/avera-action-entrypoint.sh'
      - '.github/workflows/publish-docker-cli.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push avera-cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/avera-cli
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}}.{{minor}},prefix=v
            type=semver,pattern={{major}},prefix=v
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=AVERA CLI
            org.opencontainers.image.description=AI Change Verification CLI for Safety-Critical Systems
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cli
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
