[phases.setup]
nixPkgs = ["python3", "python3Packages.pip", "python3Packages.setuptools", "python3Packages.wheel"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install streamlit pydantic setuptools",
  "/opt/venv/bin/pip install -e . --no-build-isolation"
]

[start]
cmd = "/opt/venv/bin/python -m streamlit run demo/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true"
